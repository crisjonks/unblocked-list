<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>unblocked-list — terminal search</title>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;600;700&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#000708;
    --glow:#23ff6a;
    --muted:#3aa37a;
    --panel-alpha:0.04;
    font-family:"JetBrains Mono", ui-monospace, SFMono-Regular, Menlo, Monaco, "Roboto Mono", "Courier New", monospace;
  }
  html,body{height:100%;margin:0;background:var(--bg);color:var(--glow);-webkit-font-smoothing:antialiased}
  /* matrix bg covers full viewport */
  canvas#matrix{position:fixed;inset:0;z-index:-2;pointer-events:none;opacity:0.08}

  /* page */
  .wrap{min-height:100vh;box-sizing:border-box;padding:28px 36px;display:flex;flex-direction:column;gap:14px;background:transparent}
  .header{display:flex;align-items:center;gap:12px}
  .dots{display:flex;gap:6px}
  .dot{width:10px;height:10px;border-radius:50%}
  .r{background:#ff5f56}.y{background:#ffbd2e}.g{background:#27c93f}
  .title{font-size:20px;font-weight:700;color:var(--glow);letter-spacing:1px}

  /* terminal input area */
  .term {
    width:100%;
    max-width:920px;
    background:rgba(0,0,0,0.18);
    border:1px solid rgba(255,255,255,0.03);
    padding:14px 16px;
    border-radius:8px;
    box-shadow:0 6px 28px rgba(0,0,0,0.6);
    position:relative;
    font-size:15px;
  }

  .prompt {
    display:flex;align-items:center;gap:12px;
  }
  .prompt .caret {
    color:var(--muted);
    font-weight:600;
    min-width:74px;
  }
  .input-wrap{flex:1;position:relative}
  input.terminal-input{
    width:100%;
    background:transparent;
    border:0;
    outline:none;
    color:var(--glow);
    font-family:inherit;
    font-size:16px;
    padding:6px 4px;
  }
  .hint { color:var(--muted); font-size:12px; margin-top:8px; }

  /* suggestion popup (IDE style) */
  .suggestions {
    position:absolute;
    top:100%;
    left:0;
    margin-top:8px;
    width:min(640px,100%);
    background:rgba(0,0,0,0.92);
    border:1px solid rgba(255,255,255,0.04);
    border-radius:8px;
    box-shadow:0 8px 30px rgba(0,0,0,0.6);
    overflow:hidden;
    z-index:40;
  }
  .suggestions ul{list-style:none;margin:0;padding:6px 6px;max-height:320px;overflow:auto}
  .suggestions li{
    padding:8px 10px;border-radius:6px;margin:6px 4px;color:var(--muted);
    display:flex;justify-content:space-between;gap:10px;align-items:center;font-size:14px;
    cursor:pointer;
  }
  .suggestions li:hover, .suggestions li.active{
    background:linear-gradient(90deg, rgba(35,255,106,0.06), rgba(35,255,106,0.03));
    color:var(--glow);
  }
  .suggest-name{font-weight:700}

  /* filtered grid of games below */
  .grid{margin-top:18px;display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:10px}
  a.item{display:block;padding:10px;border-radius:6px;text-decoration:none;color:var(--glow);
    background:linear-gradient(180deg,rgba(255,255,255,0.01),rgba(0,0,0,0.06));
    border:1px solid rgba(35,255,106,var(--panel-alpha));font-size:13px;box-shadow:inset 0 -8px 18px rgba(0,0,0,0.45);
    transition:transform .09s ease,box-shadow .09s}
  a.item:hover{transform:translateY(-3px);box-shadow:0 10px 30px rgba(0,0,0,0.6)}
  .name{font-weight:700}
  .path{font-size:11px;color:var(--muted);margin-top:6px;display:block}

  @media (max-width:780px){ .term{padding:12px} .grid{grid-template-columns:repeat(auto-fill,minmax(160px,1fr))} }
</style>
</head>
<body>
<canvas id="matrix" aria-hidden="true"></canvas>

<div class="wrap">
  <div class="header">
    <div class="dots" aria-hidden="true"><span class="dot r"></span><span class="dot y"></span><span class="dot g"></span></div>
    <div class="title">unblocked-list</div>
  </div>

  <div class="term" role="search" aria-label="terminal search">
    <div class="prompt">
      <div class="caret">&gt; search</div>
      <div class="input-wrap">
        <input id="termInput" class="terminal-input" aria-autocomplete="list" autocomplete="off" spellcheck="false" placeholder="" />
        <div id="suggestions" class="suggestions" style="display:none" role="listbox" aria-label="suggestions">
          <ul id="suggestList"></ul>
        </div>
      </div>
    </div>
    <div class="hint">Tab to autocomplete, Enter to open (exact match or selection). Use ↑ ↓ to move.</div>
  </div>

  <div id="grid" class="grid" aria-live="polite"></div>
</div>

<script>
/* original repo-derived list with folders + non-.swf files only */
const raw = `1v1.lol
2048
8-ball-pool
a-dark-room
among-us-online-scratch
appel-multiplayer
appel
awesome-planes
awesome-tanks-2
awesome-tanks
basket-random
bitlife
block-blast
bob-the-robber-2
bob-the-robber-4
boxel-rebound
boxing-random
burrito-bison-launcha-libre
celeste-classic-2-lanis-trek
celeste-classic
choppy-orc-autosplitter
circloo-2
circloo
cloud-platformer-fun
color-switch
connect-4
cookie-clicker
crossy-road
cut-the-rope-time-travel
cut-the-rope
divinastros
doodle-jump
doom-marines-best-friend
doom
drift-boss
drive-mad
earn-to-die-2
egg-ascent
eggy-car
emulatrix
fireboy-and-watergirl-2
fireboy-and-watergirl-3
fireboy-and-watergirl-4
fnaf-2
fnaf
friday-night-funkin
getaway-shootout
heretic
hextris
jelly-truck
johnny-upgrade
js-dos
jstetris
little-alchemy-2
madalin-stunt-cars-2
merge-melon
minecraftish-MMO
mini-golf-online
mini-metro-london
minicraft
mission-in-snowdriftland
moschess
moto-x3m-2
moto-x3m-3
moto-x3m-pool-party
moto-x3m-spooky-land
moto-x3m-winter
moto-x3m
n-gon
neverball
openttd
osu-full-remake
ovo
paper.io-2
pentashift
picohot
pip!
plants-vs.-zombies-web-demo
polytrack
pong
quake-3-arena-demo
recoil
red-square-game
retro-bowl-college
retro-bowl
rooftop-snipers
ruffle-swf-player
run-3
sandtris
slither.io-online
slope
snow-rider-3d
soccer-random
spelunky-classic-hd
stack
stealing-the-diamond
stickman-hook
submersible
subway-surfers
super-mario-war
superhot-prototype
supertux-classic
taking-shape
tanuki-sunset
temple-run-2
tennis-physics
terminus
tetris/jstetris-1.20
the-final-earth-2
the-tale-of-the-adhd-dinosaur
there-is-no-game
time-shooter-2
time-shooter-3-swat
tiny-fishing
tomb-of-the-mask
tube-jumpers
tunnel-rush
vex-3
vex-4
vex-5
vex-6
vex-7
vex-8
wolfenstein-3d
yongjin-brick-breaker`;

/* build files array (exclude any .swf accidentally present) */
const files = raw.split(/\r?\n/).map(s=>s.trim()).filter(Boolean).filter(f => !f.toLowerCase().endsWith('.swf'));

/* DOM refs */
const input = document.getElementById('termInput');
const suggBox = document.getElementById('suggestions');
const suggList = document.getElementById('suggestList');
const grid = document.getElementById('grid');

/* state */
let suggestions = [];
let active = -1; // index in suggestions

/* helper: compute suggestions based on current q */
function computeSuggestions(q){
  if(!q) return []; 
  const ql = q.toLowerCase();
  // prioritize startsWith matches, then contains
  const starts = files.filter(f=>f.toLowerCase().startsWith(ql));
  const contains = files.filter(f=>!f.toLowerCase().startsWith(ql) && f.toLowerCase().includes(ql));
  return [...starts, ...contains].slice(0, 8);
}

/* render suggestions popup */
function renderSuggestions(arr){
  suggestions = arr;
  active = arr.length ? 0 : -1;
  if(!arr.length){ suggBox.style.display='none'; suggList.innerHTML=''; return;}
  suggBox.style.display='block';
  suggList.innerHTML = '';
  arr.forEach((s, i) => {
    const li = document.createElement('li');
    li.setAttribute('role','option');
    li.dataset.index = i;
    li.innerHTML = `<span class="suggest-name">${escapeHtml(s)}</span><span class="muted">${escapeHtml('/unblocked-list/' + s)}</span>`;
    if(i === active) li.classList.add('active');
    li.addEventListener('mouseenter', ()=>{ setActive(i); });
    li.addEventListener('mouseleave', ()=>{ setActive(-1); });
    li.addEventListener('mousedown', (ev)=>{ // mousedown to avoid blur before click
      ev.preventDefault();
      selectSuggestion(i);
    });
    suggList.appendChild(li);
  });
}

/* set active suggestion index (visual) */
function setActive(index){
  const lis = suggList.querySelectorAll('li');
  lis.forEach(li=>li.classList.remove('active'));
  if(index >=0 && lis[index]) lis[index].classList.add('active');
  active = index;
}

/* autocomplete current input from active suggestion or first suggestion */
function autocomplete(){
  if(suggestions.length === 0) return;
  const idx = active >= 0 ? active : 0;
  input.value = suggestions[idx];
  // trigger update
  onInput();
}

/* when a suggestion is chosen (enter or click) */
function selectSuggestion(idx){
  if(idx < 0 || idx >= suggestions.length) return;
  const name = suggestions[idx];
  // navigate to the URL
  const url = '/unblocked-list/' + encodeURIComponent(name);
  window.location.href = url;
}

/* escape html for safe rendering */
function escapeHtml(str){ return str.replace(/[&<>"']/g, s=>({ '&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;' }[s])); }

/* update grid below and suggestions as user types */
function onInput(){
  const q = input.value;
  // suggestions
  const sug = computeSuggestions(q);
  renderSuggestions(sug);
  // render grid (full filtered list, not just suggestions)
  renderGrid(q);
}

/* render grid of games filtered by q (if q empty show all) */
function renderGrid(q){
  const ql = (q || '').toLowerCase();
  const filtered = ql ? files.filter(f => f.toLowerCase().includes(ql)) : files;
  grid.innerHTML = '';
  filtered.forEach(name => {
    const a = document.createElement('a');
    a.className = 'item';
    a.href = '/unblocked-list/' + encodeURIComponent(name);
    a.innerHTML = `<div class="name">${escapeHtml(name)}</div><div class="path">/unblocked-list/${escapeHtml(name)}</div>`;
    grid.appendChild(a);
  });
}

/* helpers for keyboard nav */
function moveActive(delta){
  if(suggestions.length === 0) return;
  active = (active + delta + suggestions.length) % suggestions.length;
  setActive(active);
  // ensure active item visible
  const lis = suggList.querySelectorAll('li');
  if(lis[active]) lis[active].scrollIntoView({block:'nearest'});
}

/* input event handlers */
input.addEventListener('input', onInput);

input.addEventListener('keydown', (e) => {
  if(e.key === 'ArrowDown'){
    e.preventDefault();
    moveActive(1);
  } else if(e.key === 'ArrowUp'){
    e.preventDefault();
    moveActive(-1);
  } else if(e.key === 'Tab'){
    if(suggestions.length){
      e.preventDefault();
      autocomplete();
      // reopen suggestions for new input
      setTimeout(onInput, 0);
    }
  } else if(e.key === 'Enter'){
    e.preventDefault();
    if(active >= 0 && suggestions[active]){
      selectSuggestion(active);
      return;
    }
    // exact-match navigation (case-insensitive)
    const typed = input.value.trim();
    if(!typed) return;
    const match = files.find(f => f.toLowerCase() === typed.toLowerCase());
    if(match){
      window.location.href = '/unblocked-list/' + encodeURIComponent(match);
    } else {
      // no exact match: if there is exactly one suggestion, navigate there
      if(suggestions.length === 1){
        selectSuggestion(0);
      }
    }
  } else if(e.key === 'Escape'){
    // hide suggestions
    suggestions = []; renderSuggestions([]);
  }
});

/* click outside hides suggestions */
document.addEventListener('click', (ev)=>{
  if(!ev.target.closest('.term')){ suggestions = []; renderSuggestions([]); }
});

/* initial render: show full grid and placeholder text in input */
renderGrid('');
input.placeholder = ''; // terminal shows prompt on the left instead
input.value = '';
// focus input on page load
setTimeout(()=> input.focus(), 150);

/* matrix background (full-screen) */
(function matrix(){
  const c = document.getElementById('matrix');
  const ctx = c.getContext('2d');
  let cols = Math.max(6, Math.floor(window.innerWidth / 14));
  let drops = Array.from({length:cols}, ()=>Math.floor(Math.random()*40));
  const chars = "01<>/\\|[]{}abcdefghijklmnopqrstuvwxyz0123456789".split('');
  function resize(){
    c.width = window.innerWidth;
    c.height = window.innerHeight;
    cols = Math.max(6, Math.floor(c.width / 14));
    drops = Array.from({length:cols}, ()=>Math.floor(Math.random()*40));
  }
  window.addEventListener('resize', resize);
  resize();
  function step(){
    ctx.fillStyle = 'rgba(0,0,0,0.06)';
    ctx.fillRect(0,0,c.width,c.height);
    ctx.font = '12px "JetBrains Mono", monospace';
    const colW = c.width / Math.max(1, cols);
    for(let i=0;i<cols;i++){
      const x = i*colW + 6;
      const y = drops[i]*14;
      ctx.fillStyle = 'rgba(35,255,106,0.12)';
      ctx.fillText(chars[Math.floor(Math.random()*chars.length)], x, y);
      drops[i]++;
      if(drops[i]*14 > c.height || Math.random() > 0.995) drops[i]=0;
    }
    requestAnimationFrame(step);
  }
  requestAnimationFrame(step);
})();
</script>
</body>
</html>
