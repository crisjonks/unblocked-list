<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>unblocked-list — folders + .swf</title>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;600;700&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#000708;
    --glow:#23ff6a;
    --muted:#3aa37a;
    font-family:"JetBrains Mono", ui-monospace, "SFMono-Regular", Menlo, Monaco, "Roboto Mono", monospace;
  }
  html,body{height:100%;margin:0;background:var(--bg);color:var(--glow);-webkit-font-smoothing:antialiased}
  canvas#matrix{position:fixed;inset:0;z-index:-2;pointer-events:none;opacity:0.08}
  .terminal{min-height:100vh;padding:28px 36px;display:flex;flex-direction:column;gap:12px;background:transparent}
  .header{display:flex;align-items:center;gap:12px}
  .logo-dots{display:flex;gap:6px}
  .dot{width:10px;height:10px;border-radius:50%}
  .r{background:#ff5f56}.y{background:#ffbd2e}.g{background:#27c93f}
  .title{font-size:20px;font-weight:700;letter-spacing:1px}
  .controls{display:flex;gap:12px;align-items:center;margin-top:8px}
  .search{background:transparent;border:1px solid rgba(255,255,255,0.05);padding:9px 12px;border-radius:6px;color:var(--glow);outline:none;min-width:260px;font-family:inherit}
  .list{margin-top:12px;display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:10px}
  a.item{display:block;padding:10px;border-radius:6px;text-decoration:none;color:var(--glow);background:linear-gradient(180deg,rgba(255,255,255,0.01),rgba(0,0,0,0.06));border:1px solid rgba(35,255,106,0.04);font-size:13px;box-shadow:inset 0 -8px 18px rgba(0,0,0,0.45);transition:transform .09s ease,box-shadow .09s}
  a.item:hover{transform:translateY(-3px);box-shadow:0 10px 30px rgba(0,0,0,0.6)}
  .name{font-weight:700}
  .path{font-size:11px;color:var(--muted);margin-top:6px;display:block}
  @media (max-width:720px){ .list{grid-template-columns:repeat(auto-fill,minmax(160px,1fr))} .terminal{padding:18px} }
</style>
</head>
<body>
<canvas id="matrix" aria-hidden="true"></canvas>

<div class="terminal" role="main" aria-label="unblocked games terminal">
  <div class="header">
    <div class="logo-dots" aria-hidden="true"><div class="dot r"></div><div class="dot y"></div><div class="dot g"></div></div>
    <div class="title">unblocked-list</div>
  </div>

  <div class="controls">
    <input id="q" class="search" placeholder="filter — type to narrow (e.g. 'moto' or '.swf')" aria-label="filter games">
  </div>

  <div id="list" class="list" tabindex="0" aria-live="polite"></div>
</div>

/* parse out single-token names (we already have only names here) */
const lines = raw.split(/\r?\n/).map(s=>s.trim()).filter(Boolean);

// render into the grid
const listEl = document.getElementById('list');
function render(arr){
  listEl.innerHTML = '';
  arr.forEach(n=>{
    const a = document.createElement('a');
    a.className = 'item';
    a.href = '/' + encodeURIComponent(n);
    a.innerHTML = `<div class="name">${n}</div><div class="path">/${n}</div>`;
    a.tabIndex = 0;
    listEl.appendChild(a);
  });
}
render(lines);

// filter input
document.getElementById('q').addEventListener('input', e=>{
  const v = e.target.value.trim().toLowerCase();
  if(!v) return render(lines);
  render(lines.filter(x=>x.toLowerCase().includes(v)));
});

// keyboard nav
document.getElementById('list').addEventListener('keydown', e=>{
  const items = Array.from(document.querySelectorAll('a.item'));
  if(!items.length) return;
  const cur = document.activeElement;
  let i = items.indexOf(cur);
  if(e.key==='ArrowDown' || e.key==='ArrowRight'){ e.preventDefault(); i=(i+1)%items.length; items[i].focus(); }
  if(e.key==='ArrowUp' || e.key==='ArrowLeft'){ e.preventDefault(); i=(i-1+items.length)%items.length; items[i].focus(); }
});

// matrix background
(function matrix(){
  const c = document.getElementById('matrix');
  const ctx = c.getContext('2d');
  function resize(){ c.width = innerWidth; c.height = innerHeight; cols = Math.max(8, Math.floor(c.width/14)); drops = Array.from({length:cols}, ()=>Math.floor(Math.random()*40)); }
  let cols = Math.max(8, Math.floor(window.innerWidth/14));
  let drops = Array.from({length:cols}, ()=>Math.floor(Math.random()*40));
  const chars = "01<>/\\|[]{}abcdefghijklmnopqrstuvwxyz0123456789".split('');
  resize(); addEventListener('resize', resize);
  function step(){
    ctx.fillStyle='rgba(0,0,0,0.06)'; ctx.fillRect(0,0,c.width,c.height);
    ctx.font='12px "JetBrains Mono", monospace';
    const colW = c.width / Math.max(1, cols);
    for(let i=0;i<cols;i++){
      const x = i*colW + 6;
      const y = drops[i]*14;
      ctx.fillStyle='rgba(35,255,106,0.12)';
      ctx.fillText(chars[Math.floor(Math.random()*chars.length)], x, y);
      drops[i]++;
      if(drops[i]*14 > c.height || Math.random() > 0.995) drops[i]=0;
    }
    requestAnimationFrame(step);
  }
  requestAnimationFrame(step);
})();
