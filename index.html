<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>unblocked-list</title>

<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;600;700&display=swap" rel="stylesheet">

<style>
:root{
  --bg:#000708;
  --glow:#23ff6a;
  --muted:#3aa37a;
  --panel:rgba(0,0,0,.45);
  --border:rgba(35,255,106,.08);
  --font:"JetBrains Mono", monospace;
}

*{
  box-sizing:border-box;
}

html,body{
  margin:0;
  height:100%;
  background:var(--bg);
  color:var(--glow);
  font-family:var(--font);
  overflow-x:hidden;
}

canvas#matrix{
  position:fixed;
  inset:0;
  z-index:-2;
  opacity:.08;
  pointer-events:none;
}

.wrap{
  min-height:100vh;
  padding:28px 36px;
}

.header{
  display:flex;
  align-items:center;
  justify-content:space-between;
  gap:16px;
  margin-bottom:20px;
}

.left{
  display:flex;
  align-items:center;
  gap:12px;
}

.dots{
  display:flex;
  gap:6px;
}

.dot{
  width:10px;
  height:10px;
  border-radius:50%;
}

.r{background:#ff5f56;}
.y{background:#ffbd2e;}
.g{background:#27c93f;}

.title{
  font-size:20px;
  font-weight:700;
  letter-spacing:1px;
}

.top-actions{
  display:flex;
  gap:10px;
}

.btn{
  background:rgba(0,0,0,.5);
  border:1px solid rgba(35,255,106,.12);
  color:var(--glow);
  border-radius:10px;
  padding:10px 14px;
  font-family:inherit;
  cursor:pointer;
  transition:.15s ease;
}

.btn:hover{
  background:rgba(35,255,106,.08);
  transform:translateY(-1px);
}

.term{
  width:100%;
  max-width:950px;
  background:rgba(0,0,0,.2);
  border:1px solid rgba(255,255,255,.04);
  padding:14px 16px;
  border-radius:12px;
  position:relative;
  box-shadow:0 8px 40px rgba(0,0,0,.45);
}

.prompt{
  display:flex;
  align-items:center;
  gap:12px;
}

.caret{
  color:var(--muted);
  min-width:85px;
  font-weight:700;
}

.input-wrap{
  position:relative;
  flex:1;
}

.terminal-input{
  width:100%;
  background:transparent;
  border:none;
  outline:none;
  color:var(--glow);
  font-size:16px;
  font-family:inherit;
}

.suggestions{
  position:absolute;
  top:100%;
  left:0;
  margin-top:8px;
  width:min(650px,100%);
  background:rgba(0,0,0,.95);
  border:1px solid rgba(255,255,255,.05);
  border-radius:12px;
  overflow:hidden;
  display:none;
  z-index:50;
}

.suggestions ul{
  margin:0;
  padding:8px;
  list-style:none;
  max-height:320px;
  overflow:auto;
}

.suggestions li{
  padding:10px;
  border-radius:8px;
  display:flex;
  justify-content:space-between;
  gap:10px;
  cursor:pointer;
  color:var(--muted);
}

.suggestions li:hover,
.suggestions li.active{
  background:rgba(35,255,106,.08);
  color:var(--glow);
}

.grid{
  margin-top:20px;
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(220px,1fr));
  gap:12px;
}

.item{
  display:block;
  text-decoration:none;
  color:var(--glow);
  background:linear-gradient(180deg,rgba(255,255,255,.02),rgba(0,0,0,.2));
  border:1px solid var(--border);
  padding:12px;
  border-radius:12px;
  transition:.15s ease;
}

.item:hover{
  transform:translateY(-3px);
  background:rgba(35,255,106,.05);
}

.name{
  font-weight:700;
}

.path{
  font-size:11px;
  margin-top:6px;
  color:var(--muted);
}

/* GAME OVERLAY */

#gameOverlay{
  position:fixed;
  inset:0;
  background:#000;
  z-index:999;
  opacity:0;
  visibility:hidden;
  transition:.15s ease;
}

#gameOverlay.open{
  opacity:1;
  visibility:visible;
}

#gameFrame{
  width:100%;
  height:100%;
  border:none;
  background:#000;
}

.back-edge{
  position:absolute;
  top:0;
  left:0;
  width:80px;
  height:100%;
  opacity:0;
  pointer-events:none;
  transition:.15s ease;
  display:flex;
  align-items:center;
  justify-content:flex-start;
  padding-left:12px;
  background:linear-gradient(90deg, rgba(35,255,106,.15), transparent);
}

.back-edge.show{
  opacity:1;
  pointer-events:auto;
}

.back-button{
  width:42px;
  height:42px;
  border-radius:999px;
  border:none;
  background:rgba(0,0,0,.65);
  color:var(--glow);
  font-size:22px;
  cursor:pointer;
  border:1px solid rgba(35,255,106,.2);
}

/* CHAT */

.modal{
  position:fixed;
  inset:0;
  background:rgba(0,0,0,.7);
  display:flex;
  align-items:center;
  justify-content:center;
  z-index:1000;
  opacity:0;
  visibility:hidden;
  transition:.15s ease;
  padding:20px;
}

.modal.open{
  opacity:1;
  visibility:visible;
}

.modal-card{
  width:min(700px,100%);
  background:#06110a;
  border:1px solid rgba(35,255,106,.12);
  border-radius:16px;
  overflow:hidden;
  box-shadow:0 20px 60px rgba(0,0,0,.6);
}

.modal-header{
  padding:16px 18px;
  border-bottom:1px solid rgba(35,255,106,.08);
  display:flex;
  justify-content:space-between;
  align-items:center;
}

.modal-body{
  padding:18px;
}

.chat-log{
  height:320px;
  overflow:auto;
  border:1px solid rgba(35,255,106,.08);
  border-radius:12px;
  padding:12px;
  background:rgba(0,0,0,.3);
  margin-bottom:12px;
}

.msg{
  margin-bottom:10px;
  line-height:1.5;
}

.user{
  color:#7effa7;
}

.ai{
  color:#d7ffe5;
}

.chat-row{
  display:flex;
  gap:10px;
}

.chat-input{
  flex:1;
  background:#020703;
  border:1px solid rgba(35,255,106,.08);
  color:var(--glow);
  border-radius:10px;
  padding:12px;
  font-family:inherit;
  outline:none;
}

.close{
  background:none;
  border:none;
  color:var(--glow);
  font-size:20px;
  cursor:pointer;
}

@media(max-width:700px){

  .wrap{
    padding:18px;
  }

  .header{
    flex-direction:column;
    align-items:flex-start;
  }

  .grid{
    grid-template-columns:repeat(auto-fill,minmax(160px,1fr));
  }

}
</style>
</head>

<body>

<canvas id="matrix"></canvas>

<div class="wrap">

  <div class="header">

    <div class="left">
      <div class="dots">
        <span class="dot r"></span>
        <span class="dot y"></span>
        <span class="dot g"></span>
      </div>

      <div class="title">unblocked-list</div>
    </div>

    <div class="top-actions">
      <button class="btn" id="openChatBtn">✦ AI chat</button>
    </div>

  </div>

  <div class="term">

    <div class="prompt">

      <div class="caret">&gt; search</div>

      <div class="input-wrap">

        <input
          id="termInput"
          class="terminal-input"
          autocomplete="off"
          spellcheck="false"
        >

        <div id="suggestions" class="suggestions">
          <ul id="suggestList"></ul>
        </div>

      </div>

    </div>

  </div>

  <div id="grid" class="grid"></div>

</div>

<!-- GAME OVERLAY -->

<div id="gameOverlay" aria-hidden="true">

  <div class="back-edge" id="backEdge">

    <button class="back-button" id="backBtn">←</button>

  </div>

  <iframe id="gameFrame"></iframe>

</div>

<!-- CHAT -->

<div class="modal" id="chatModal">

  <div class="modal-card">

    <div class="modal-header">

      <div>
        <div style="font-weight:700;">AI chat</div>
        <div style="font-size:12px;color:var(--muted);margin-top:4px;">
          Ask for game recommendations, site help, or general chat.
        </div>
      </div>

      <button class="close" id="closeChat">×</button>

    </div>

    <div class="modal-body">

      <div class="chat-log" id="chatLog">
        <div class="msg ai">
          AI chat is not connected yet.
        </div>
      </div>

      <div class="chat-row">

        <input
          id="chatInput"
          class="chat-input"
        >

        <button class="btn" id="sendChat">
          Send
        </button>

      </div>

    </div>

  </div>

</div>

<script>
const raw = `1v1.lol
2048
8-ball-pool
a-dark-room
among-us-online-scratch
appel-multiplayer
appel
awesome-planes
awesome-tanks-2
awesome-tanks
basket-random
bitlife
block-blast
bob-the-robber-2
bob-the-robber-4
boxel-rebound
boxing-random
burrito-bison-launcha-libre
celeste-classic-2-lanis-trek
celeste-classic
circloo
cookie-clicker
crossy-road
cut-the-rope
doom
drift-boss
drive-mad
eggy-car
fnaf
friday-night-funkin
getaway-shootout
hextris
jelly-truck
johnny-upgrade
madalin-stunt-cars-2
minecraftish-MMO
moto-x3m
ovo
paper.io-2
polytrack
retro-bowl
rooftop-snipers
run-3
slope
snow-rider-3d
stickman-hook
subway-surfers
superhot-prototype
tanuki-sunset
temple-run-2
tiny-fishing
tomb-of-the-mask
tunnel-rush
vex-3
vex-4
vex-5
vex-6
vex-7
wolfenstein-3d`;

const files = raw
.split(/\r?\n/)
.map(v => v.trim())
.filter(Boolean);

const input = document.getElementById('termInput');
const grid = document.getElementById('grid');
const suggestionsBox = document.getElementById('suggestions');
const suggestList = document.getElementById('suggestList');

let suggestions = [];
let active = -1;

function escapeHtml(str){
  return str.replace(/[&<>"']/g,m=>({
    '&':'&amp;',
    '<':'&lt;',
    '>':'&gt;',
    '"':'&quot;',
    "'":'&#39;'
  }[m]));
}

function gameUrl(name){
  return './' + encodeURIComponent(name);
}

function renderGrid(q=''){
  const filtered = files.filter(v =>
    v.toLowerCase().includes(q.toLowerCase())
  );

  grid.innerHTML='';

  filtered.forEach(name => {

    const el = document.createElement('a');

    el.href = gameUrl(name);
    el.className='item';

    el.innerHTML = `
      <div class="name">${escapeHtml(name)}</div>
      <div class="path">/${escapeHtml(name)}</div>
    `;

    el.addEventListener('click', e=>{
      e.preventDefault();
      openGame(name);
    });

    grid.appendChild(el);

  });
}

function computeSuggestions(q){

  if(!q) return [];

  const lower = q.toLowerCase();

  const starts = files.filter(v =>
    v.toLowerCase().startsWith(lower)
  );

  const contains = files.filter(v =>
    !v.toLowerCase().startsWith(lower) &&
    v.toLowerCase().includes(lower)
  );

  return [...starts,...contains].slice(0,8);
}

function renderSuggestions(arr){

  suggestions = arr;

  if(!arr.length){
    suggestionsBox.style.display='none';
    suggestList.innerHTML='';
    return;
  }

  suggestionsBox.style.display='block';

  suggestList.innerHTML='';

  arr.forEach((s,i)=>{

    const li = document.createElement('li');

    li.innerHTML = `
      <span>${escapeHtml(s)}</span>
      <span>${escapeHtml('/'+s)}</span>
    `;

    if(i===0){
      li.classList.add('active');
      active=0;
    }

    li.addEventListener('mousedown',e=>{
      e.preventDefault();
      openGame(s);
    });

    li.addEventListener('mouseenter',()=>{
      document.querySelectorAll('.suggestions li')
      .forEach(v=>v.classList.remove('active'));

      li.classList.add('active');
      active=i;
    });

    suggestList.appendChild(li);

  });

}

input.addEventListener('input',()=>{

  const q = input.value;

  renderSuggestions(computeSuggestions(q));
  renderGrid(q);

});

input.addEventListener('keydown',e=>{

  if(e.key==='Enter'){

    e.preventDefault();

    if(suggestions[active]){
      openGame(suggestions[active]);
    }

  }

});

document.addEventListener('click',e=>{

  if(!e.target.closest('.term')){
    suggestionsBox.style.display='none';
  }

});

renderGrid();

/* GAME OVERLAY */

const gameOverlay = document.getElementById('gameOverlay');
const gameFrame = document.getElementById('gameFrame');
const backEdge = document.getElementById('backEdge');
const backBtn = document.getElementById('backBtn');

function openGame(name){

  gameFrame.src = gameUrl(name);

  gameOverlay.classList.add('open');
  document.body.style.overflow='hidden';

}

function closeGame(){

  gameOverlay.classList.remove('open');
  gameFrame.src='about:blank';
  backEdge.classList.remove('show');
  document.body.style.overflow='';

}

backBtn.addEventListener('click',closeGame);

gameOverlay.addEventListener('mousemove',e=>{

  if(e.clientX <= 18){
    backEdge.classList.add('show');
  }else{
    backEdge.classList.remove('show');
  }

});

backEdge.addEventListener('mouseenter',()=>{
  backEdge.classList.add('show');
});

gameOverlay.addEventListener('mouseleave',()=>{
  backEdge.classList.remove('show');
});

/* CHAT */

const chatModal = document.getElementById('chatModal');

document.getElementById('openChatBtn')
.addEventListener('click',()=>{

  chatModal.classList.add('open');

});

document.getElementById('closeChat')
.addEventListener('click',()=>{

  chatModal.classList.remove('open');

});

document.getElementById('sendChat')
.addEventListener('click',()=>{

  const input = document.getElementById('chatInput');

  if(!input.value.trim()) return;

  const log = document.getElementById('chatLog');

  const user = document.createElement('div');
  user.className='msg user';
  user.textContent='You: ' + input.value;

  log.appendChild(user);

  const ai = document.createElement('div');
  ai.className='msg ai';
  ai.textContent='AI backend not connected yet.';

  log.appendChild(ai);

  log.scrollTop = log.scrollHeight;

  input.value='';

});

/* MATRIX */

(function(){

  const c = document.getElementById('matrix');
  const ctx = c.getContext('2d');

  let cols;
  let drops;

  const chars = '01<>/[]{}';

  function resize(){

    c.width = innerWidth;
    c.height = innerHeight;

    cols = Math.floor(innerWidth / 14);

    drops = Array(cols).fill(1);

  }

  addEventListener('resize',resize);

  resize();

  function draw(){

    ctx.fillStyle='rgba(0,0,0,.08)';
    ctx.fillRect(0,0,c.width,c.height);

    ctx.fillStyle='rgba(35,255,106,.15)';
    ctx.font='12px JetBrains Mono';

    for(let i=0;i<drops.length;i++){

      const text = chars[Math.floor(Math.random()*chars.length)];

      ctx.fillText(
        text,
        i*14,
        drops[i]*14
      );

      if(drops[i]*14 > c.height && Math.random()>.975){
        drops[i]=0;
      }

      drops[i]++;

    }

    requestAnimationFrame(draw);

  }

  draw();

})();
</script>

</body>
</html>
